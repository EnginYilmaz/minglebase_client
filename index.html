<!-- index.html içine -->
<button id="testButton">Firestore'a Yazmayı Dene</button>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import { firebaseConfig } from './firebase-config.js'; // Bu dosyanın var olduğundan emin olun

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById('testButton').onclick = async () => {
    try {
      console.log("Firestore'a yazma denemesi...");
      alert("Firestore'a yazma denemesi...");
      await setDoc(doc(db, "testCollection", "testDoc"), { time: new Date() });
      console.log("BAŞARILI!");
      alert("BAŞARILI!");
    } catch (error) {
      console.error("HATA:", error);
      alert("HATA: " + error.message);
    }
  };
</script>
