<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	
	<title>My Game</title>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
	<script src="assets/scenes/uskudarsahilyolu.js"></script>
	<script src="src/main.js" type="module"></script>

	<style>
		body {
			background: #2f2f2f;
			margin: 0;
			padding: 0;
		}
	</style>

</head>

<body>

	<!-- CHAT UI CONTAINER (Gizli Başlar) -->
	<div id="chat-ui-container" style="display: none; position: absolute; bottom: 20px; right: 20px; width: 300px; height: 400px; background: rgba(0,0,0,0.8); border: 2px solid #555; border-radius: 10px; z-index: 1000; flex-direction: column; padding: 10px; font-family: sans-serif; color: white;">
		<div style="display: flex; justify-content: space-between; border-bottom: 1px solid #777; padding-bottom: 5px; margin-bottom: 5px;">
			<h3 style="margin: 0; font-size: 16px;">Chat</h3>
			<button id="close-chat-btn" style="background: red; color: white; border: none; cursor: pointer;">X</button>
		</div>
		<div id="chat-messages" style="flex-grow: 1; overflow-y: auto; margin-bottom: 10px; font-size: 14px; display: flex; flex-direction: column; gap: 5px;"></div>
		<div style="display: flex; gap: 5px;">
			<input type="text" id="chat-input" style="flex-grow: 1; padding: 5px;" placeholder="Mesaj yaz..." />
			<button id="chat-send-btn" style="padding: 5px 10px; cursor: pointer;">Gönder</button>
		</div>
	</div>

</body>

</html>
